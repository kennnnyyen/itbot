<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Widget Local Test</title>
  <style>body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }</style>
</head>
<body>
  <h1>IT Widget — Local Test</h1>
  <p>The chat button should appear in the bottom-right corner.</p>

  <p style="background:#fffbe6;border:1px solid #e6c800;padding:.75rem 1rem;border-radius:6px;font-size:.9rem;">
    <strong>Testing mode:</strong> identity is hardcoded below. In production these values
    are rendered server-side by WordPress into the <code>data-*</code> attributes.
  </p>

  <!-- Point to the locally built file, not the nginx-served one -->
  <!-- data-username and data-first-name are supplied by the authenticated WordPress page. -->
  <!-- During local testing they are hardcoded here. -->
  <script src="./dist/it-survivor-bot.js"
          data-username="test.user"
          data-first-name="Tester"></script>
</body>
</html>
